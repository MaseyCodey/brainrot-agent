name: Brainrot Cloud Agent

on:
  schedule:
    - cron: "0 16 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  make-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg and voice engine
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install google-api-python-client google-auth google-auth-httplib2 pillow

      - name: Create and run upgraded brainrot agent
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          cat > brainrot_agent.py <<'PY'
          import os
          import random
          import subprocess
          import textwrap
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFilter

          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          OUT = Path("output")
          OUT.mkdir(exist_ok=True)

          creatures = [
              "Glimbo the Outlet Rat",
              "The Tax Goblin",
              "Bluetooth Barry",
              "Fridgewalker Supreme",
              "The WiFi Gremlin",
              "Sir Waffleton",
              "The Microwave Monk",
              "Captain Skib Noodle",
              "The Dust Bunny Emperor",
              "The Ranch Phantom",
              "Professor Nugget",
              "The Thermostat Goblin",
              "The Costco Phantom",
              "The Gas Station Oracle",
              "The Laundry Goblin",
              "The Gas Station Sandwich Prophet",
              "Bluetooth Toilet Wizard",
              "The Left Sock Entity",
              "The Microwave Burrito King",
              "Uncle Buffering"
          ]

          locations = [
              "behind a gas station",
              "inside a broken vending machine",
              "under the couch",
              "in aisle seven at Walmart",
              "inside a forgotten freezer",
              "behind the thermostat",
              "inside the drive-thru speaker",
              "under a pile of laundry",
              "inside a suspicious air vent",
              "inside the Costco food court",
              "under the passenger seat",
              "behind the dryer",
              "inside a gas station hot dog roller",
              "next to a printer that actually works"
          ]

          triggers = [
              "your phone hits one percent",
              "someone says just one more episode",
              "the WiFi disconnects",
              "a nugget falls on the floor",
              "the thermostat clicks",
              "someone microwaves fish",
              "you hear a random Bluetooth pairing sound",
              "a shopping cart wheel squeaks",
              "the lights flicker twice",
              "someone opens a bag of chips too loud",
              "a printer jams for no reason",
              "someone says it should be easy",
              "the group chat goes silent",
              "someone asks for a quick favor"
          ]

          powers = [
              "became financially literate",
              "unlocked forbidden snack knowledge",
              "started speaking in coupon codes",
              "learned how to dodge responsibilities",
              "became immune to awkward silence",
              "turned every room into a side quest",
              "summoned unpaid parking tickets",
              "gained max-level yap power",
              "downloaded a cursed firmware update",
              "started vibrating at Costco frequency",
              "became the final boss of minor inconvenience",
              "absorbed the power of every lost charger"
          ]

          weaknesses = [
              "lukewarm ranch",
              "a fully charged Android",
              "eye contact with a manager",
              "a clean microwave",
              "unsalted fries",
              "a receipt longer than three feet",
              "the sound of a printer working correctly",
              "a perfectly folded fitted sheet",
              "room temperature Capri Sun",
              "someone saying let's circle back",
              "a working ice cream machine",
              "a freshly updated router",
              "a cart with four working wheels"
          ]

          punchlines = [
              "And that is why nobody parks near the cart return anymore.",
              "Scientists still refuse to explain the smell.",
              "The government denied knowing him, but his LinkedIn says otherwise.",
              "He was last seen arguing with a Roomba.",
              "Local witnesses say he had zero aura but unlimited confidence.",
              "If you see him, do not offer him a payment plan.",
              "He cannot be stopped, only mildly inconvenienced.",
              "The HOA tried to fine him and immediately vanished.",
              "His credit score is classified.",
              "Nobody survived the group chat after that.",
              "The vending machine now calls him father.",
              "Every thermostat in the building changed itself to 89.",
              "The printer started working out of fear."
          ]

          def make_script():
              creature = random.choice(creatures)
              location = random.choice(locations)
              trigger = random.choice(triggers)
              power = random.choice(powers)
              weakness = random.choice(weaknesses)
              punchline = random.choice(punchlines)

              lines = [
                  f"This is {creature}.",
                  f"It appears {location} when {trigger}.",
                  f"People thought it was harmless until it {power}.",
                  f"Its only known weakness is {weakness}.",
                  "If you see it, do not run.",
                  "Running activates its premium subscription mode.",
                  punchline
              ]

              script = " ".join(lines)
              title = f"{creature} is not real... probably #Shorts"
              description = (
                  "AI-generated fictional comedy short. "
                  "Original absurd brainrot character lore. "
                  "#Shorts #brainrot #ai #comedy"
              )
              tags = ["Shorts", "brainrot", "AI comedy", "fictional", "weird lore"]

              return title, description, tags, script, lines, creature

          def make_background(creature):
              bg_path = OUT / "background.png"

              img = Image.new("RGB", (1080, 1920), (8, 8, 14))
              draw = ImageDraw.Draw(img)

              for i in range(0, 1920, 8):
                  r = int(15 + i / 1920 * 30)
                  g = int(10 + i / 1920 * 20)
                  b = int(35 + i / 1920 * 80)
                  draw.rectangle([0, i, 1080, i + 8], fill=(r, g, b))

              for _ in range(90):
                  x = random.randint(-200, 1080)
                  y = random.randint(-200, 1920)
                  size = random.randint(60, 260)
                  color = random.choice([
                      (40, 80, 180),
                      (90, 40, 160),
                      (30, 130, 120),
                      (150, 60, 80)
                  ])
                  draw.ellipse([x, y, x + size, y + size], fill=color)

              img = img.filter(ImageFilter.GaussianBlur(radius=28))
              draw = ImageDraw.Draw(img)

              title = creature.upper()
              wrapped = textwrap.wrap(title, width=16)

              y = 190
              for line in wrapped:
                  draw.text((540, y), line, fill=(255, 255, 255), anchor="mm")
                  y += 70

              draw.rectangle([80, 1500, 1000, 1800], outline=(255, 255, 255), width=6)
              draw.text((540, 1650), "AI FICTIONAL LORE FILE", fill=(255, 255, 255), anchor="mm")

              img.save(bg_path)
              return bg_path

          def make_voice(script):
              voice_path = OUT / "voice.wav"

              cmd = [
                  "espeak-ng",
                  "-v", "en-us+m3",
                  "-s", "172",
                  "-p", "55",
                  "-w", str(voice_path),
                  script
              ]

              subprocess.run(cmd, check=True)
              return voice_path

          def get_audio_duration(audio_path):
              cmd = [
                  "ffprobe",
                  "-v", "error",
                  "-show_entries", "format=duration",
                  "-of", "default=noprint_wrappers=1:nokey=1",
                  str(audio_path)
              ]

              result = subprocess.run(cmd, capture_output=True, text=True, check=True)
              duration = float(result.stdout.strip())
              return max(duration + 1.5, 25)

          def escape_ass_text(text):
              return text.replace("{", "").replace("}", "").replace("\n", " ")

          def make_subtitles(lines, duration):
              ass_path = OUT / "captions.ass"

              per_line = duration / len(lines)

              header = """[Script Info]
          ScriptType: v4.00+
          PlayResX: 1080
          PlayResY: 1920

          [V4+ Styles]
          Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
          Style: Default,Arial,76,&H00FFFFFF,&H000000FF,&H00000000,&H99000000,1,0,0,0,100,100,0,0,1,6,2,2,70,70,250,1

          [Events]
          Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text
          """

              def ts(seconds):
                  h = int(seconds // 3600)
                  m = int((seconds % 3600) // 60)
                  s = int(seconds % 60)
                  cs = int((seconds - int(seconds)) * 100)
                  return f"{h}:{m:02d}:{s:02d}.{cs:02d}"

              events = []
              for i, line in enumerate(lines):
                  start = i * per_line
                  end = min((i + 1) * per_line, duration)
                  short = "\\N".join(textwrap.wrap(line, width=22))
                  events.append(
                      f"Dialogue: 0,{ts(start)},{ts(end)},Default,,0,0,0,,{escape_ass_text(short)}"
                  )

              ass_path.write_text(header + "\n".join(events), encoding="utf-8")
              return ass_path

          def make_video(script, lines, creature):
              bg_path = make_background(creature)
              voice_path = make_voice(script)
              duration = get_audio_duration(voice_path)
              sub_path = make_subtitles(lines, duration)

              video_path = OUT / "brainrot_short.mp4"

              cmd = [
                  "ffmpeg", "-y",
                  "-loop", "1",
                  "-i", str(bg_path),
                  "-i", str(voice_path),
                  "-t", str(duration),
                  "-vf",
                  f"scale=1080:1920,subtitles={sub_path}:force_style='Fontname=Arial,Fontsize=76,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,BorderStyle=1,Outline=6,Shadow=2,Alignment=2,MarginV=250'",
                  "-c:v", "libx264",
                  "-c:a", "aac",
                  "-shortest",
                  "-pix_fmt", "yuv420p",
                  str(video_path)
              ]

              subprocess.run(cmd, check=True)
              return video_path

          def upload_video(video_path, title, description, tags):
              client_id = os.environ["YT_CLIENT_ID"]
              client_secret = os.environ["YT_CLIENT_SECRET"]
              refresh_token = os.environ["YT_REFRESH_TOKEN"]

              creds = Credentials(
                  token=None,
                  refresh_token=refresh_token,
                  token_uri="https://oauth2.googleapis.com/token",
                  client_id=client_id,
                  client_secret=client_secret,
                  scopes=["https://www.googleapis.com/auth/youtube.upload"]
              )

              creds.refresh(Request())

              youtube = build("youtube", "v3", credentials=creds)

              body = {
                  "snippet": {
                      "title": title[:100],
                      "description": description,
                      "tags": tags,
                      "categoryId": "23"
                  },
                  "status": {
                      "privacyStatus": "private",
                      "selfDeclaredMadeForKids": False
                  }
              }

              media = MediaFileUpload(
                  str(video_path),
                  chunksize=-1,
                  resumable=True,
                  mimetype="video/mp4"
              )

              request = youtube.videos().insert(
                  part="snippet,status",
                  body=body,
                  media_body=media
              )

              response = None
              while response is None:
                  progress, response = request.next_chunk()
                  if progress:
                      print(f"Upload progress: {int(progress.progress() * 100)}%")

              print("Upload complete.")
              print("Video ID:", response.get("id"))

          title, description, tags, script, lines, creature = make_script()

          print("TITLE:", title)
          print("SCRIPT:")
          print(script)

          video = make_video(script, lines, creature)
          upload_video(video, title, description, tags)
          PY

          python brainrot_agent.py
