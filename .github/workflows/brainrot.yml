name: Brainrot Cloud Agent

on:
  schedule:
    - cron: "0 16 * * *" # 9 AM MST
    - cron: "0 19 * * *" # 12 PM MST
  workflow_dispatch:

jobs:
  make-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg and voice engine
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install google-api-python-client google-auth google-auth-httplib2 pillow

      - name: Create and run Shorts agent
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          cat > brainrot_agent.py <<'PY'
          import os
          import random
          import subprocess
          import textwrap
          import math
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont, ImageFilter

          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          OUT = Path("output")
          OUT.mkdir(exist_ok=True)

          creatures = [
              "Glimbo the Outlet Rat",
              "Bluetooth Barry",
              "Fridgewalker Supreme",
              "The WiFi Gremlin",
              "Sir Waffleton",
              "The Microwave Monk",
              "Professor Nugget",
              "The Thermostat Goblin",
              "The Costco Phantom",
              "The Gas Station Oracle",
              "The Laundry Goblin",
              "The Left Sock Entity",
              "The Microwave Burrito King",
              "Uncle Buffering",
              "Captain Cartwheel",
              "The Receipt Wizard",
              "Snack Goblin Supreme",
              "The Parking Lot Oracle",
              "The Waffle Gremlin",
              "The Vending Machine Prophet"
          ]

          situations = [
              "tries to get a free refill at a gas station",
              "accidentally becomes manager of a vending machine",
              "gets trapped inside a group chat",
              "orders one fry and starts a financial crisis",
              "tries to fix the WiFi by yelling at it",
              "joins a gym just to use the massage chair",
              "declares war on a printer",
              "gets hired by a Roomba",
              "tries to return a half-eaten burrito",
              "starts a tiny business selling suspicious coupons",
              "opens a lemonade stand inside a car wash",
              "becomes the mayor of aisle seven",
              "tries to speedrun a Costco sample line",
              "takes a job guarding lost phone chargers"
          ]

          twists = [
              "but every time he lies, his shoes squeak louder",
              "but his only skill is making awkward silence worse",
              "but he can only communicate through Bluetooth pairing noises",
              "but he accidentally becomes emotionally attached to a traffic cone",
              "but the printer respects him too much",
              "but the shopping carts follow him like loyal ducks",
              "but he keeps paying with expired coupons from 2009",
              "but his confidence is somehow louder than the fire alarm",
              "but every plan ends with him inside a laundry basket",
              "but he thinks QR codes are ancient treasure maps"
          ]

          lessons = [
              "Never trust a man who calls ketchup a smoothie.",
              "Always check the vent before you blame the WiFi.",
              "If the printer starts whispering, clock out.",
              "A coupon is not a personality, but he made it work.",
              "Some legends are born. Others are found behind the dryer.",
              "That is why the break room has rules now.",
              "That is why nobody touches the thermostat anymore.",
              "The manager said no refunds, and history changed forever.",
              "Nobody knows where he came from, but he left with the aux cord.",
              "The snack aisle has not been the same since."
          ]

          colors = [
              ((12, 20, 50), (40, 120, 255), (255, 220, 80)),
              ((20, 10, 35), (190, 70, 255), (80, 255, 180)),
              ((8, 35, 30), (60, 220, 160), (255, 120, 90)),
              ((35, 20, 8), (255, 170, 60), (90, 180, 255)),
              ((18, 18, 28), (255, 80, 140), (120, 255, 240))
          ]

          def pick_font(size):
              possible = [
                  "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
                  "/usr/share/fonts/truetype/liberation2/LiberationSans-Bold.ttf"
              ]
              for p in possible:
                  if Path(p).exists():
                      return ImageFont.truetype(p, size)
              return ImageFont.load_default()

          def wrap_text(text, width):
              return "\n".join(textwrap.wrap(text, width=width))

          def make_script():
              creature = random.choice(creatures)
              situation = random.choice(situations)
              twist = random.choice(twists)
              lesson = random.choice(lessons)

              hook = f"This is {creature}."
              line1 = f"Today he {situation}."
              line2 = f"It sounds normal, {twist}."
              line3 = "Experts tried to understand him and immediately gave up."
              line4 = lesson

              lines = [hook, line1, line2, line3, line4]

              script = " ".join(lines)

              title = f"{creature} ruined the timeline #Shorts"
              description = (
                  "Original AI-assisted fictional comedy Short. "
                  "Goofy surreal character lore, not real events. "
                  "#Shorts #brainrot #comedy #ai"
              )
              tags = ["Shorts", "brainrot", "comedy", "AI comedy", "fictional", "weird lore"]

              return title, description, tags, script, lines, creature

          def make_voice(script):
              voice_path = OUT / "voice.wav"
              cmd = [
                  "espeak-ng",
                  "-v", "en-us+m4",
                  "-s", "178",
                  "-p", "62",
                  "-w", str(voice_path),
                  script
              ]
              subprocess.run(cmd, check=True)
              return voice_path

          def audio_duration(path):
              cmd = [
                  "ffprobe",
                  "-v", "error",
                  "-show_entries", "format=duration",
                  "-of", "default=noprint_wrappers=1:nokey=1",
                  str(path)
              ]
              result = subprocess.run(cmd, capture_output=True, text=True, check=True)
              return float(result.stdout.strip())

          def make_scene_image(scene_num, total_scenes, creature, line, palette):
              bg, accent, accent2 = palette
              img = Image.new("RGB", (1080, 1920), bg)
              draw = ImageDraw.Draw(img)

              # gradient background
              for y in range(1920):
                  blend = y / 1920
                  r = int(bg[0] * (1 - blend) + accent[0] * blend * 0.45)
                  g = int(bg[1] * (1 - blend) + accent[1] * blend * 0.45)
                  b = int(bg[2] * (1 - blend) + accent[2] * blend * 0.45)
                  draw.line([(0, y), (1080, y)], fill=(r, g, b))

              # soft blob shapes
              for i in range(18):
                  x = random.randint(-180, 1080)
                  y = random.randint(-180, 1920)
                  s = random.randint(80, 330)
                  c = accent if i % 2 == 0 else accent2
                  draw.ellipse([x, y, x+s, y+s], fill=c)

              img = img.filter(ImageFilter.GaussianBlur(18))
              draw = ImageDraw.Draw(img)

              # goofy character body
              cx = 540
              cy = 710 + int(math.sin(scene_num) * 30)
              body_color = accent2
              outline = (255, 255, 255)

              draw.ellipse([cx-190, cy-230, cx+190, cy+230], fill=body_color, outline=outline, width=8)
              draw.ellipse([cx-95, cy-65, cx-35, cy-5], fill=(255,255,255))
              draw.ellipse([cx+35, cy-65, cx+95, cy-5], fill=(255,255,255))
              draw.ellipse([cx-73, cy-45, cx-48, cy-20], fill=(0,0,0))
              draw.ellipse([cx+57, cy-45, cx+82, cy-20], fill=(0,0,0))
              draw.arc([cx-80, cy+20, cx+80, cy+120], 0, 180, fill=(0,0,0), width=10)

              # little arms
              draw.line([cx-185, cy+20, cx-330, cy+130], fill=outline, width=14)
              draw.line([cx+185, cy+20, cx+330, cy+130], fill=outline, width=14)

              # top label
              small_font = pick_font(46)
              big_font = pick_font(72)
              cap_font = pick_font(68)

              draw.rounded_rectangle([80, 80, 1000, 205], radius=35, fill=(0,0,0), outline=outline, width=4)
              draw.text((540, 142), "FICTIONAL LORE FILE", font=small_font, fill=(255,255,255), anchor="mm")

              # creature name
              name = wrap_text(creature.upper(), 18)
              draw.text((540, 315), name, font=big_font, fill=(255,255,255), anchor="mm", stroke_width=5, stroke_fill=(0,0,0), align="center")

              # caption box
              wrapped = wrap_text(line, 24)
              draw.rounded_rectangle([70, 1270, 1010, 1745], radius=45, fill=(0,0,0), outline=outline, width=5)
              draw.text((540, 1505), wrapped, font=cap_font, fill=(255,255,255), anchor="mm", stroke_width=3, stroke_fill=(0,0,0), align="center")

              # scene counter
              draw.text((540, 1825), f"PART {scene_num + 1}/{total_scenes}", font=small_font, fill=(255,255,255), anchor="mm")

              path = OUT / f"scene_{scene_num}.png"
              img.save(path)
              return path

          def make_video(script, lines, creature):
              voice = make_voice(script)
              duration = max(audio_duration(voice) + 0.8, 22)
              scene_time = duration / len(lines)
              palette = random.choice(colors)

              scene_paths = []
              for i, line in enumerate(lines):
                  scene_paths.append(make_scene_image(i, len(lines), creature, line, palette))

              list_file = OUT / "scenes.txt"
              with list_file.open("w", encoding="utf-8") as f:
                  for path in scene_paths:
                      f.write(f"file '{path.resolve()}'\n")
                      f.write(f"duration {scene_time}\n")
                  f.write(f"file '{scene_paths[-1].resolve()}'\n")

              slideshow = OUT / "slideshow.mp4"
              cmd1 = [
                  "ffmpeg", "-y",
                  "-f", "concat",
                  "-safe", "0",
                  "-i", str(list_file),
                  "-vf", "scale=1080:1920,format=yuv420p",
                  "-r", "30",
                  "-c:v", "libx264",
                  str(slideshow)
              ]
              subprocess.run(cmd1, check=True)

              final = OUT / "brainrot_short.mp4"
              cmd2 = [
                  "ffmpeg", "-y",
                  "-i", str(slideshow),
                  "-i", str(voice),
                  "-c:v", "copy",
                  "-c:a", "aac",
                  "-shortest",
                  "-metadata", "title=AI fictional comedy short",
                  str(final)
              ]
              subprocess.run(cmd2, check=True)
              return final

          def upload_video(video_path, title, description, tags):
              client_id = os.environ["YT_CLIENT_ID"]
              client_secret = os.environ["YT_CLIENT_SECRET"]
              refresh_token = os.environ["YT_REFRESH_TOKEN"]

              creds = Credentials(
                  token=None,
                  refresh_token=refresh_token,
                  token_uri="https://oauth2.googleapis.com/token",
                  client_id=client_id,
                  client_secret=client_secret,
                  scopes=["https://www.googleapis.com/auth/youtube.upload"]
              )

              creds.refresh(Request())
              youtube = build("youtube", "v3", credentials=creds)

              body = {
                  "snippet": {
                      "title": title[:100],
                      "description": description,
                      "tags": tags,
                      "categoryId": "23"
                  },
                  "status": {
                      "privacyStatus": "public",
                      "selfDeclaredMadeForKids": False
                  }
              }

              media = MediaFileUpload(
                  str(video_path),
                  chunksize=-1,
                  resumable=True,
                  mimetype="video/mp4"
              )

              request = youtube.videos().insert(
                  part="snippet,status",
                  body=body,
                  media_body=media
              )

              response = None
              while response is None:
                  progress, response = request.next_chunk()
                  if progress:
                      print(f"Upload progress: {int(progress.progress() * 100)}%")

              print("Upload complete.")
              print("Video ID:", response.get("id"))

          title, description, tags, script, lines, creature = make_script()

          print("TITLE:", title)
          print("SCRIPT:", script)

          video = make_video(script, lines, creature)
          upload_video(video, title, description, tags)
          PY

          python brainrot_agent.py
