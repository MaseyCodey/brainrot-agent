<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offliner OS - Super Notepad</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f3;
            --panel: #ffffff;
            --panel-2: #eef3f6;
            --panel-3: #e5e9df;
            --text: #1d252c;
            --muted: #65717a;
            --line: #c9d1d6;
            --line-strong: #8d9aa3;
            --accent: #1f7a8c;
            --accent-2: #b64242;
            --accent-3: #5c7f36;
            --accent-4: #b88724;
            --shadow: 0 18px 45px rgba(22, 30, 36, 0.18);
            --shadow-soft: 0 10px 22px rgba(22, 30, 36, 0.10);
            --editor-font: Georgia, "Times New Roman", serif;
            --editor-size: 18px;
            --editor-line: 1.65;
            --radius: 8px;
            --topbar-h: 58px;
            --cmd-h: 70px;
        }

        [data-theme="dark"] {
            color-scheme: dark;
            --bg: #161819;
            --panel: #222526;
            --panel-2: #292e31;
            --panel-3: #30332d;
            --text: #f0f1ed;
            --muted: #a9b1b5;
            --line: #444b50;
            --line-strong: #68747c;
            --accent: #57a6b7;
            --accent-2: #df766d;
            --accent-3: #9fc173;
            --accent-4: #e2b64f;
            --shadow: 0 22px 48px rgba(0, 0, 0, 0.46);
            --shadow-soft: 0 12px 24px rgba(0, 0, 0, 0.28);
        }

        [data-theme="ink"] {
            color-scheme: dark;
            --bg: #101417;
            --panel: #1b2126;
            --panel-2: #242b30;
            --panel-3: #172528;
            --text: #edf7f4;
            --muted: #9fb2b1;
            --line: #355057;
            --line-strong: #52737d;
            --accent: #4fb4a7;
            --accent-2: #e36f56;
            --accent-3: #a7c95f;
            --accent-4: #e0a541;
            --shadow: 0 22px 50px rgba(0, 0, 0, 0.56);
            --shadow-soft: 0 14px 24px rgba(0, 0, 0, 0.34);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-width: 320px;
            height: 100%;
            margin: 0;
        }

        body {
            min-height: 100dvh;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(31, 122, 140, 0.08), transparent 34%),
                linear-gradient(315deg, rgba(182, 66, 66, 0.08), transparent 36%),
                var(--bg);
            color: var(--text);
            font-family: "Segoe UI", Arial, sans-serif;
            letter-spacing: 0;
            transition: background-color 180ms ease, color 180ms ease;
        }

        button,
        input,
        textarea,
        select {
            font: inherit;
        }

        button {
            border: 0;
            color: inherit;
        }

        .desktop {
            height: 100dvh;
            min-height: 620px;
            display: grid;
            grid-template-rows: var(--topbar-h) minmax(0, 1fr) var(--cmd-h);
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 18px;
            border-bottom: 1px solid var(--line);
            background: color-mix(in srgb, var(--panel) 92%, transparent);
            backdrop-filter: blur(18px);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.22) inset;
            z-index: 60;
        }

        .brand {
            min-width: 180px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border-radius: var(--radius);
            background: var(--text);
            color: var(--panel);
            box-shadow: var(--shadow-soft);
            font-weight: 900;
        }

        .topbar-spacer {
            flex: 1;
        }

        .clock {
            min-width: 106px;
            text-align: center;
            color: var(--muted);
            font-size: 0.92rem;
            font-variant-numeric: tabular-nums;
        }

        .icon-btn,
        .tool-btn,
        .chip-btn,
        .dock-btn,
        .mini-btn {
            display: inline-grid;
            place-items: center;
            min-width: 34px;
            height: 34px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel);
            color: var(--text);
            cursor: pointer;
            user-select: none;
            transition: transform 120ms ease, background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
        }

        .icon-btn:hover,
        .tool-btn:hover,
        .chip-btn:hover,
        .dock-btn:hover,
        .mini-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
        }

        .icon-btn:active,
        .tool-btn:active,
        .chip-btn:active,
        .dock-btn:active,
        .mini-btn:active {
            transform: translateY(1px);
        }

        .chip-btn {
            width: auto;
            padding: 0 10px;
            gap: 6px;
            grid-auto-flow: column;
            font-size: 0.88rem;
            font-weight: 700;
        }

        .mini-btn {
            width: auto;
            min-width: 28px;
            height: 28px;
            padding: 0 8px;
            font-size: 0.8rem;
        }

        .workbench {
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 72px;
            gap: 14px;
            padding: 14px 18px;
        }

        .notepad-window {
            min-width: 0;
            min-height: 0;
            display: grid;
            grid-template-columns: 284px minmax(0, 1fr) 246px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .notepad-window.is-hidden {
            display: none;
        }

        .note-sidebar,
        .inspector {
            min-height: 0;
            background: var(--panel-2);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
        }

        .inspector {
            border-right: 0;
            border-left: 1px solid var(--line);
            background: var(--panel-3);
        }

        .side-head,
        .inspector-head {
            padding: 14px;
            border-bottom: 1px solid var(--line);
        }

        .side-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .side-title {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 800;
        }

        .doc-action-row,
        .template-row,
        .toolbar-group,
        .status-group,
        .find-row,
        .export-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .doc-action-row {
            margin-top: 12px;
        }

        .search-shell {
            margin-top: 12px;
            position: relative;
        }

        .search-shell input,
        .find-row input,
        .note-title-input,
        .tag-input,
        .goal-input,
        .select-control {
            width: 100%;
            min-width: 0;
            height: 34px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel);
            color: var(--text);
            outline: none;
            padding: 0 10px;
        }

        .search-shell input:focus,
        .find-row input:focus,
        .note-title-input:focus,
        .tag-input:focus,
        .goal-input:focus,
        .select-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
        }

        .template-row {
            margin-top: 10px;
        }

        .template-row .mini-btn {
            flex: 1;
        }

        .doc-list {
            min-height: 0;
            overflow: auto;
            padding: 10px;
        }

        .doc-row {
            width: 100%;
            min-height: 72px;
            display: grid;
            grid-template-columns: 8px minmax(0, 1fr) auto;
            gap: 10px;
            align-items: stretch;
            padding: 10px;
            border: 1px solid transparent;
            border-radius: var(--radius);
            background: transparent;
            cursor: pointer;
            text-align: left;
            color: var(--text);
        }

        .doc-row:hover {
            background: color-mix(in srgb, var(--panel) 72%, transparent);
            border-color: var(--line);
        }

        .doc-row.active {
            background: var(--panel);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
        }

        .doc-color {
            border-radius: 999px;
            background: var(--accent);
        }

        .doc-main {
            min-width: 0;
        }

        .doc-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.95rem;
            font-weight: 800;
        }

        .doc-meta {
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.78rem;
            font-variant-numeric: tabular-nums;
        }

        .doc-tags {
            margin-top: 6px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .tag-pill {
            max-width: 92px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 2px 6px;
            border-radius: 999px;
            background: color-mix(in srgb, var(--accent) 15%, var(--panel));
            color: var(--text);
            font-size: 0.72rem;
        }

        .doc-flags {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .note-main {
            min-width: 0;
            min-height: 0;
            display: grid;
            grid-template-rows: auto auto minmax(0, 1fr) auto;
            background: var(--panel);
        }

        .note-titlebar {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) minmax(160px, 260px) auto;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
        }

        .note-title-input {
            height: 38px;
            font-size: 1.04rem;
            font-weight: 800;
        }

        .status-pill {
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 4px 8px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--panel-2);
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .note-toolbar {
            min-height: 45px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 6px 10px;
            border-bottom: 1px solid var(--line);
            background: color-mix(in srgb, var(--panel-2) 76%, var(--panel));
        }

        .tool-btn {
            width: 32px;
            height: 32px;
            font-size: 0.9rem;
            font-weight: 800;
        }

        .select-control {
            width: auto;
            min-width: 92px;
            padding-right: 26px;
            font-size: 0.86rem;
        }

        .swatch {
            width: 24px;
            height: 24px;
            border: 2px solid var(--panel);
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 0 0 1px var(--line);
        }

        .swatch:hover {
            box-shadow: 0 0 0 2px var(--accent);
        }

        .editor-wrap {
            min-height: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
        }

        .find-panel {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-bottom: 1px solid var(--line);
            background: var(--panel);
        }

        .find-panel.is-open {
            display: flex;
        }

        .find-row {
            flex: 1;
            min-width: 180px;
        }

        .find-row input {
            max-width: 210px;
        }

        .editor-scroll {
            min-height: 0;
            overflow: auto;
            background:
                linear-gradient(90deg, transparent 0, transparent 30px, color-mix(in srgb, var(--accent-2) 14%, transparent) 30px, color-mix(in srgb, var(--accent-2) 14%, transparent) 31px, transparent 31px),
                var(--panel);
        }

        #editor-area {
            width: min(100%, 900px);
            min-height: 100%;
            margin: 0 auto;
            padding: 34px 44px 80px;
            outline: none;
            color: var(--text);
            font-family: var(--editor-font);
            font-size: var(--editor-size);
            line-height: var(--editor-line);
            overflow-wrap: anywhere;
        }

        #editor-area:empty::before {
            content: "Start writing...";
            color: var(--muted);
        }

        #editor-area h1,
        #editor-area h2,
        #editor-area h3 {
            font-family: "Segoe UI", Arial, sans-serif;
            letter-spacing: 0;
            line-height: 1.18;
            margin: 0.8em 0 0.35em;
        }

        #editor-area h1 {
            font-size: 1.9em;
        }

        #editor-area h2 {
            font-size: 1.48em;
        }

        #editor-area h3 {
            font-size: 1.16em;
        }

        #editor-area p {
            margin: 0 0 0.85em;
        }

        #editor-area blockquote {
            margin: 1em 0;
            padding: 0.2em 1em;
            border-left: 4px solid var(--accent);
            color: color-mix(in srgb, var(--text) 82%, var(--muted));
            background: color-mix(in srgb, var(--accent) 8%, transparent);
        }

        #editor-area code {
            padding: 2px 5px;
            border-radius: 5px;
            background: var(--panel-2);
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.92em;
        }

        .note-footer {
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 5px 12px;
            border-top: 1px solid var(--line);
            background: var(--panel-2);
            color: var(--muted);
            font-size: 0.78rem;
            font-variant-numeric: tabular-nums;
        }

        .inspector-content {
            min-height: 0;
            overflow: auto;
            padding: 12px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .stat {
            min-height: 58px;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: color-mix(in srgb, var(--panel) 80%, transparent);
        }

        .stat-num {
            font-size: 1.15rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        .stat-label {
            margin-top: 2px;
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .meter {
            width: 100%;
            height: 8px;
            margin-top: 10px;
            border-radius: 999px;
            background: color-mix(in srgb, var(--line) 52%, transparent);
            overflow: hidden;
        }

        .meter-fill {
            width: 0;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent-3), var(--accent));
            transition: width 180ms ease;
        }

        .section-label {
            margin: 18px 0 8px;
            color: var(--muted);
            font-size: 0.74rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .outline-list,
        .snapshot-list {
            display: grid;
            gap: 6px;
        }

        .outline-btn,
        .snapshot-btn {
            width: 100%;
            min-height: 30px;
            padding: 6px 8px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: color-mix(in srgb, var(--panel) 82%, transparent);
            color: var(--text);
            cursor: pointer;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .outline-btn:hover,
        .snapshot-btn:hover {
            border-color: var(--accent);
        }

        .setting-stack {
            display: grid;
            gap: 8px;
        }

        .setting-line {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 86px;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 700;
        }

        .goal-input {
            height: 30px;
            padding: 0 6px;
            font-size: 0.82rem;
        }

        .app-dock {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: stretch;
        }

        .dock-btn {
            height: 62px;
            width: 62px;
            grid-template-rows: 26px auto;
            gap: 4px;
            font-size: 0.72rem;
            font-weight: 800;
            background: var(--panel);
        }

        .dock-icon {
            font-size: 1.35rem;
            line-height: 1;
        }

        .command-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px 16px;
            border-top: 1px solid var(--line);
            background: color-mix(in srgb, var(--panel) 92%, transparent);
        }

        #command-bar {
            flex: 1;
            min-width: 0;
            height: 44px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--panel);
            color: var(--text);
            padding: 0 20px;
            outline: none;
            box-shadow: var(--shadow-soft);
            text-align: center;
        }

        #command-bar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent), var(--shadow-soft);
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: color-mix(in srgb, var(--bg) 88%, rgba(0, 0, 0, 0.26));
            backdrop-filter: blur(12px);
        }

        .overlay.is-open {
            display: flex;
        }

        .overlay-window {
            width: min(980px, 100%);
            max-height: min(780px, calc(100dvh - 48px));
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .overlay-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            background: var(--panel-2);
        }

        .overlay-title {
            margin: 0;
            font-size: 1.1rem;
        }

        .overlay-body {
            min-height: 0;
            overflow: auto;
            padding: 16px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
        }

        .app-card {
            min-height: 132px;
            display: grid;
            align-content: center;
            justify-items: center;
            gap: 8px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel);
            cursor: pointer;
            color: var(--text);
        }

        .app-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
        }

        .app-card-icon {
            font-size: 2.2rem;
        }

        .app-card-title {
            font-weight: 900;
        }

        .reverser-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            gap: 16px;
            align-items: stretch;
        }

        .io-box {
            min-width: 0;
            display: grid;
            grid-template-rows: auto minmax(220px, 1fr);
            gap: 8px;
        }

        .io-box label,
        .check-row,
        .radio-row {
            color: var(--muted);
            font-size: 0.88rem;
            font-weight: 800;
        }

        .io-box textarea {
            width: 100%;
            resize: vertical;
            min-height: 220px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel-2);
            color: var(--text);
            outline: none;
            padding: 14px;
            line-height: 1.5;
        }

        .io-box textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
        }

        .arrow-icon {
            display: grid;
            place-items: center;
            color: var(--accent);
            font-size: 2rem;
        }

        .control-panel {
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .check-row,
        .radio-row {
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        #game-stage {
            background: #050607;
        }

        .game-shell {
            position: relative;
            width: min(450px, calc(100dvw - 44px));
            height: min(720px, calc(100dvh - 44px));
            border: 1px solid #636363;
            border-radius: var(--radius);
            overflow: hidden;
            background: #151515;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.55);
        }

        #road {
            position: absolute;
            inset: 0 24px;
            overflow: hidden;
            background:
                linear-gradient(90deg, transparent 32%, rgba(255, 255, 255, 0.18) 32%, rgba(255, 255, 255, 0.18) 34%, transparent 34%, transparent 66%, rgba(255, 255, 255, 0.18) 66%, rgba(255, 255, 255, 0.18) 68%, transparent 68%),
                #3b3b3b;
            border-left: 8px solid #d8b33f;
            border-right: 8px solid #d8b33f;
        }

        .lane-marker {
            position: absolute;
            top: -120px;
            width: 6px;
            height: 240px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.42);
            animation: laneMove 850ms linear infinite;
        }

        .lane-marker.m1 { left: 32%; }
        .lane-marker.m2 { left: 66%; animation-delay: 220ms; }
        .lane-marker.m3 { left: 32%; animation-delay: 430ms; }
        .lane-marker.m4 { left: 66%; animation-delay: 650ms; }

        @keyframes laneMove {
            from { transform: translateY(0); }
            to { transform: translateY(860px); }
        }

        #player,
        .enemy {
            position: absolute;
            width: 58px;
            height: 58px;
            display: grid;
            place-items: center;
            font-size: 48px;
            line-height: 1;
            transition: left 120ms ease;
            z-index: 4;
        }

        #player {
            bottom: 34px;
        }

        .enemy {
            top: -70px;
        }

        #game-ui {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 8;
            display: grid;
            gap: 4px;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius);
            background: rgba(0, 0, 0, 0.58);
            color: #fff;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        .game-controls {
            position: absolute;
            right: 12px;
            bottom: 12px;
            z-index: 9;
            display: flex;
            gap: 8px;
        }

        .game-controls .icon-btn {
            color: #fff;
            background: rgba(0, 0, 0, 0.62);
            border-color: rgba(255, 255, 255, 0.25);
        }

        #term-window {
            position: fixed;
            top: 78px;
            left: 78px;
            z-index: 900;
            display: none;
            width: min(680px, calc(100dvw - 32px));
            height: min(430px, calc(100dvh - 120px));
            min-width: 310px;
            min-height: 220px;
            resize: both;
            overflow: hidden;
            border: 1px solid #596268;
            border-radius: var(--radius);
            background: #07090a;
            color: #e8f0e8;
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.55);
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
        }

        #term-window.is-open {
            display: flex;
            flex-direction: column;
        }

        #term-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 10px;
            border-bottom: 1px solid #263139;
            background: #101418;
            cursor: move;
            user-select: none;
            font-weight: 900;
        }

        #term-body {
            flex: 1;
            overflow: auto;
            padding: 10px;
        }

        .log-line {
            display: grid;
            grid-template-columns: 86px minmax(0, 1fr);
            gap: 8px;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .log-time { color: #6f7b82; }
        .log-sys { color: #cfd7db; }
        .log-success { color: #76d275; }
        .log-error { color: #ff7770; }
        .log-warn { color: #e4c252; }
        .log-dev { color: #7dcfe6; font-weight: 900; }

        .toast-region {
            position: fixed;
            right: 18px;
            bottom: calc(var(--cmd-h) + 14px);
            z-index: 1000;
            display: grid;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            max-width: min(420px, calc(100dvw - 36px));
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-left: 5px solid var(--accent);
            border-radius: var(--radius);
            background: var(--panel);
            color: var(--text);
            box-shadow: var(--shadow-soft);
            font-size: 0.88rem;
            font-weight: 700;
            animation: toastIn 180ms ease;
        }

        .toast.error {
            border-left-color: var(--accent-2);
        }

        .toast.warn {
            border-left-color: var(--accent-4);
        }

        @keyframes toastIn {
            from { transform: translateY(8px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .hidden-file {
            display: none;
        }

        .empty-state {
            padding: 20px 12px;
            color: var(--muted);
            text-align: center;
            font-weight: 700;
        }

        .notepad-window.is-focus {
            grid-template-columns: minmax(0, 1fr);
        }

        .notepad-window.is-focus .note-sidebar,
        .notepad-window.is-focus .inspector,
        .notepad-window.is-focus .note-toolbar,
        .notepad-window.is-focus .note-footer {
            display: none;
        }

        .notepad-window.is-focus .note-titlebar {
            grid-template-columns: minmax(0, 1fr) auto;
        }

        .notepad-window.is-focus .tag-input {
            display: none;
        }

        @media (max-width: 1120px) {
            .notepad-window {
                grid-template-columns: 248px minmax(0, 1fr);
            }

            .inspector {
                display: none;
            }
        }

        @media (max-width: 820px) {
            body {
                overflow: auto;
            }

            .desktop {
                min-height: 100dvh;
                height: auto;
                grid-template-rows: auto auto auto;
            }

            .topbar {
                flex-wrap: wrap;
            }

            .brand {
                min-width: 150px;
            }

            .workbench {
                grid-template-columns: minmax(0, 1fr);
                padding: 10px;
            }

            .app-dock {
                flex-direction: row;
                order: -1;
                overflow-x: auto;
            }

            .dock-btn {
                flex: 0 0 64px;
            }

            .notepad-window {
                min-height: 760px;
                grid-template-columns: minmax(0, 1fr);
            }

            .note-sidebar {
                max-height: 260px;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .doc-list {
                display: flex;
                gap: 8px;
                overflow-x: auto;
            }

            .doc-row {
                min-width: 220px;
            }

            .note-titlebar {
                grid-template-columns: minmax(0, 1fr);
            }

            #editor-area {
                padding: 26px 24px 70px;
            }

            .reverser-layout {
                grid-template-columns: minmax(0, 1fr);
            }

            .arrow-icon {
                transform: rotate(90deg);
            }

            .clock {
                text-align: left;
            }
        }

        @media print {
            body {
                background: #fff;
                color: #000;
                overflow: visible;
            }

            .topbar,
            .note-sidebar,
            .inspector,
            .note-titlebar,
            .note-toolbar,
            .note-footer,
            .app-dock,
            .command-row,
            .overlay,
            #term-window,
            .toast-region {
                display: none !important;
            }

            .desktop,
            .workbench,
            .notepad-window,
            .note-main,
            .editor-wrap,
            .editor-scroll {
                display: block;
                height: auto;
                min-height: 0;
                overflow: visible;
                padding: 0;
                border: 0;
                box-shadow: none;
                background: #fff;
            }

            #editor-area {
                width: auto;
                min-height: 0;
                margin: 0;
                padding: 0;
                color: #000;
            }
        }
    </style>
</head>
<body>
    <div class="desktop">
        <header class="topbar">
            <div class="brand" aria-label="Offliner OS">
                <div class="brand-mark">O</div>
                <div>Offliner OS</div>
            </div>
            <button class="chip-btn" onclick="openNotepad()" title="Open notepad"><span>📔</span><span>Notepad</span></button>
            <button class="chip-btn" onclick="openAppLibrary()" title="Open app library"><span>▦</span><span>Apps</span></button>
            <button class="chip-btn" onclick="showTerminal()" title="Open terminal"><span>⌁</span><span>Terminal</span></button>
            <div class="topbar-spacer"></div>
            <div class="clock" id="clock">--:--</div>
            <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Cycle theme">☀</button>
        </header>

        <main class="workbench">
            <section id="notepad-stage" class="notepad-window" aria-label="Super notepad">
                <aside class="note-sidebar">
                    <div class="side-head">
                        <div class="side-title-row">
                            <h2 class="side-title">Notes</h2>
                            <button class="icon-btn" onclick="newNote()" title="New note">＋</button>
                        </div>
                        <div class="doc-action-row">
                            <button class="mini-btn" onclick="duplicateActiveNote()" title="Duplicate note">Copy</button>
                            <button class="mini-btn" onclick="togglePinActive()" title="Pin note">Pin</button>
                            <button class="mini-btn" onclick="deleteActiveNote()" title="Delete note">Del</button>
                        </div>
                        <div class="search-shell">
                            <input id="note-search" type="search" placeholder="Search notes" oninput="renderDocList()" autocomplete="off">
                        </div>
                        <div class="template-row">
                            <button class="mini-btn" onclick="newNote('journal')" title="Journal template">Journal</button>
                            <button class="mini-btn" onclick="newNote('tasks')" title="Task list template">Tasks</button>
                            <button class="mini-btn" onclick="newNote('meeting')" title="Meeting notes template">Meet</button>
                        </div>
                    </div>
                    <div id="doc-list" class="doc-list"></div>
                </aside>

                <section class="note-main">
                    <div class="note-titlebar">
                        <input id="note-title" class="note-title-input" type="text" oninput="renameActiveNote(this.value)" autocomplete="off" spellcheck="true">
                        <input id="tag-input" class="tag-input" type="text" placeholder="tags: idea, draft" oninput="updateActiveTags(this.value)" autocomplete="off">
                        <div class="status-group">
                            <span id="save-status" class="status-pill">Ready</span>
                            <button class="icon-btn" onclick="toggleFocusMode()" title="Focus mode">◱</button>
                        </div>
                    </div>

                    <div class="note-toolbar">
                        <div class="toolbar-group">
                            <button class="tool-btn" onclick="formatDoc('undo')" title="Undo">↶</button>
                            <button class="tool-btn" onclick="formatDoc('redo')" title="Redo">↷</button>
                        </div>
                        <div class="toolbar-group">
                            <button class="tool-btn" onclick="formatDoc('bold')" title="Bold"><b>B</b></button>
                            <button class="tool-btn" onclick="formatDoc('italic')" title="Italic"><i>I</i></button>
                            <button class="tool-btn" onclick="formatDoc('underline')" title="Underline"><u>U</u></button>
                            <button class="tool-btn" onclick="formatDoc('strikeThrough')" title="Strike">S</button>
                        </div>
                        <div class="toolbar-group">
                            <select id="block-select" class="select-control" onchange="formatBlock(this.value)" title="Text style">
                                <option value="P">Body</option>
                                <option value="H1">Heading 1</option>
                                <option value="H2">Heading 2</option>
                                <option value="H3">Heading 3</option>
                                <option value="BLOCKQUOTE">Quote</option>
                                <option value="PRE">Code</option>
                            </select>
                            <button class="tool-btn" onclick="formatDoc('insertUnorderedList')" title="Bullets">•</button>
                            <button class="tool-btn" onclick="formatDoc('insertOrderedList')" title="Numbers">1.</button>
                            <button class="tool-btn" onclick="insertRule()" title="Divider">―</button>
                        </div>
                        <div class="toolbar-group">
                            <button class="tool-btn" onclick="formatDoc('justifyLeft')" title="Align left">L</button>
                            <button class="tool-btn" onclick="formatDoc('justifyCenter')" title="Align center">C</button>
                            <button class="tool-btn" onclick="formatDoc('justifyRight')" title="Align right">R</button>
                        </div>
                        <div class="toolbar-group" aria-label="Color swatches">
                            <button class="swatch" style="background:#1f7a8c" onclick="setTextColor('#1f7a8c')" title="Teal"></button>
                            <button class="swatch" style="background:#b64242" onclick="setTextColor('#b64242')" title="Red"></button>
                            <button class="swatch" style="background:#5c7f36" onclick="setTextColor('#5c7f36')" title="Green"></button>
                            <button class="swatch" style="background:#b88724" onclick="setTextColor('#b88724')" title="Gold"></button>
                            <button class="swatch" style="background:#fff0a6" onclick="setHighlight('#fff0a6')" title="Highlight"></button>
                        </div>
                        <div class="toolbar-group">
                            <button class="tool-btn" onclick="toggleFindPanel()" title="Find">⌕</button>
                            <button class="tool-btn" onclick="saveNow('manual')" title="Save">✓</button>
                            <button class="tool-btn" onclick="printActiveNote()" title="Print">⎙</button>
                            <button class="tool-btn" onclick="document.getElementById('import-file').click()" title="Import">⇣</button>
                        </div>
                        <div class="export-row">
                            <select id="export-select" class="select-control" onchange="exportFromSelect(this.value); this.value='';" title="Export">
                                <option value="">Export</option>
                                <option value="txt">Text</option>
                                <option value="html">HTML</option>
                                <option value="json">This note JSON</option>
                                <option value="all-json">All notes JSON</option>
                            </select>
                        </div>
                    </div>

                    <div class="editor-wrap">
                        <div id="find-panel" class="find-panel">
                            <div class="find-row">
                                <input id="find-input" type="search" placeholder="Find" oninput="updateFindCount()" autocomplete="off">
                                <input id="replace-input" type="text" placeholder="Replace" autocomplete="off">
                                <button class="mini-btn" onclick="findNext()">Next</button>
                                <button class="mini-btn" onclick="replaceActive(false)">Replace</button>
                                <button class="mini-btn" onclick="replaceActive(true)">All</button>
                            </div>
                            <span id="find-count" class="status-pill">0</span>
                        </div>
                        <div class="editor-scroll">
                            <article id="editor-area" contenteditable="true" spellcheck="true" oninput="handleEditorInput()" onpaste="handlePaste(event)"></article>
                        </div>
                    </div>

                    <footer class="note-footer">
                        <div id="footer-left">Local only</div>
                        <div id="footer-right">0 words</div>
                    </footer>
                </section>

                <aside class="inspector">
                    <div class="inspector-head">
                        <h2 class="side-title">Inspector</h2>
                    </div>
                    <div class="inspector-content">
                        <div class="stat-grid">
                            <div class="stat">
                                <div id="stat-words" class="stat-num">0</div>
                                <div class="stat-label">Words</div>
                            </div>
                            <div class="stat">
                                <div id="stat-chars" class="stat-num">0</div>
                                <div class="stat-label">Chars</div>
                            </div>
                            <div class="stat">
                                <div id="stat-read" class="stat-num">0m</div>
                                <div class="stat-label">Read</div>
                            </div>
                            <div class="stat">
                                <div id="stat-sent" class="stat-num">0</div>
                                <div class="stat-label">Sentences</div>
                            </div>
                        </div>
                        <div class="meter" title="Word goal">
                            <div id="goal-fill" class="meter-fill"></div>
                        </div>

                        <div class="section-label">Document</div>
                        <div class="setting-stack">
                            <label class="setting-line">Word goal <input id="goal-input" class="goal-input" type="number" min="0" step="50" onchange="setWordGoal(this.value)"></label>
                            <label class="setting-line">Font
                                <select id="font-select" class="goal-input" onchange="setEditorFont(this.value)">
                                    <option value='Georgia, "Times New Roman", serif'>Serif</option>
                                    <option value='"Segoe UI", Arial, sans-serif'>Sans</option>
                                    <option value='Consolas, "Courier New", monospace'>Mono</option>
                                </select>
                            </label>
                            <label class="setting-line">Size
                                <select id="size-select" class="goal-input" onchange="setEditorSize(this.value)">
                                    <option value="16px">Small</option>
                                    <option value="18px">Medium</option>
                                    <option value="21px">Large</option>
                                    <option value="24px">Huge</option>
                                </select>
                            </label>
                        </div>

                        <div class="section-label">Outline</div>
                        <div id="outline-list" class="outline-list"></div>

                        <div class="section-label">Snapshots</div>
                        <div class="doc-action-row">
                            <button class="mini-btn" onclick="createSnapshot('Manual')">Add</button>
                            <button class="mini-btn" onclick="clearSnapshots()">Clear</button>
                        </div>
                        <div id="snapshot-list" class="snapshot-list"></div>
                    </div>
                </aside>
            </section>

            <nav class="app-dock" aria-label="App dock">
                <button class="dock-btn" onclick="openNotepad()" title="Notepad"><span class="dock-icon">📔</span><span>Notes</span></button>
                <button class="dock-btn" onclick="openResrever()" title="Reverser"><span class="dock-icon">↔</span><span>Reverse</span></button>
                <button class="dock-btn" onclick="startCarGame()" title="Drive game"><span class="dock-icon">▣</span><span>Drive</span></button>
                <button class="dock-btn" onclick="showTerminal()" title="Terminal"><span class="dock-icon">⌁</span><span>Logs</span></button>
                <button class="dock-btn" onclick="openAppLibrary()" title="App library"><span class="dock-icon">▦</span><span>Apps</span></button>
            </nav>
        </main>

        <div class="command-row">
            <input type="text" id="command-bar" placeholder="Type a command" onkeydown="handleCommand(event)" autocomplete="off">
        </div>
    </div>

    <div id="app-library" class="overlay">
        <section class="overlay-window">
            <header class="overlay-head">
                <h2 class="overlay-title">App Library</h2>
                <button class="icon-btn" onclick="closeOverlay('app-library')" title="Close">×</button>
            </header>
            <div class="overlay-body">
                <div class="app-grid">
                    <button class="app-card" onclick="openNotepad()">
                        <span class="app-card-icon">📔</span>
                        <span class="app-card-title">Super Notepad</span>
                    </button>
                    <button class="app-card" onclick="openResrever()">
                        <span class="app-card-icon">↔</span>
                        <span class="app-card-title">Resrever</span>
                    </button>
                    <button class="app-card" onclick="startCarGame()">
                        <span class="app-card-icon">▣</span>
                        <span class="app-card-title">Road Game</span>
                    </button>
                    <button class="app-card" onclick="showTerminal(); closeOverlay('app-library');">
                        <span class="app-card-icon">⌁</span>
                        <span class="app-card-title">Terminal</span>
                    </button>
                </div>
            </div>
        </section>
    </div>

    <div id="resrever-stage" class="overlay">
        <section class="overlay-window">
            <header class="overlay-head">
                <h2 class="overlay-title">Resrever</h2>
                <button class="icon-btn" onclick="closeOverlay('resrever-stage')" title="Close">×</button>
            </header>
            <div class="overlay-body">
                <div class="reverser-layout">
                    <div class="io-box">
                        <label for="rev-input">Input</label>
                        <textarea id="rev-input" oninput="reverseText()" onfocus="sysLog('IO: Resrever input active.', 'sys')" placeholder="Enter text"></textarea>
                    </div>
                    <div class="arrow-icon">→</div>

                    <label class="radio-row">Font
                        <select id="rev-font-select" class="select-control" onchange="changeReverseFont()">
                            <option value="Arial, sans-serif">Arial</option>
                            <option value="Consolas, 'Courier New', monospace">Code</option>
                            <option value="Georgia, 'Times New Roman', serif">Serif</option>
                            <option value="Impact, fantasy">Impact</option>

    <div id="game-stage" class="overlay">
