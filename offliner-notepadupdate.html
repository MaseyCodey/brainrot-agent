    <div id="term-window">
        <div id="term-header">
            <span>&lt;-- SYS_TERMINAL --&gt;</span>
            <button class="mini-btn" onclick="hideTerminal()" title="Close">X</button>
        </div>
        <div id="term-body"></div>
    </div>

    <input id="import-file" class="hidden-file" type="file" accept=".txt,.html,.htm,.json,text/plain,text/html,application/json" onchange="importFile(event)">
    <div id="toast-region" class="toast-region" aria-live="polite"></div>

    <script>
        const STORAGE_KEY = "offliner_os_super_notes_v2";
        const LEGACY_KEY = "notepad_data";
        const MAX_SNAPSHOTS = 18;
        const AUTO_SAVE_MS = 650;
        const SNAPSHOT_MS = 1000 * 60 * 4;
        const THEMES = ["light", "dark", "ink"];

        const templates = {
            blank: {
                title: "Untitled",
                content: "<h1>Untitled</h1><p></p>",
                tags: []
            },
            journal: {
                title: "Journal",
                content: "<h1>Journal</h1><p><b>Today:</b> </p><p><b>Wins:</b></p><ul><li></li></ul><p><b>Next:</b></p><ul><li></li></ul>",
                tags: ["journal"]
            },
            tasks: {
                title: "Task List",
                content: "<h1>Task List</h1><ul><li><label><input type='checkbox'> First task</label></li><li><label><input type='checkbox'> Second task</label></li></ul>",
                tags: ["tasks"]
            },
            meeting: {
                title: "Meeting Notes",
                content: "<h1>Meeting Notes</h1><p><b>People:</b> </p><p><b>Decisions:</b></p><ul><li></li></ul><p><b>Action items:</b></p><ul><li></li></ul>",
                tags: ["meeting"]
            },
            story: {
                title: "Story Beat",
                content: "<h1>Story Beat</h1><p><b>Scene:</b> </p><p><b>Want:</b> </p><p><b>Obstacle:</b> </p><p><b>Turn:</b> </p>",
                tags: ["story"]
            },
            study: {
                title: "Study Notes",
                content: "<h1>Study Notes</h1><h2>Main idea</h2><p></p><h2>Details</h2><ul><li></li></ul><h2>Questions</h2><ul><li></li></ul>",
                tags: ["study"]
            }
        };

        const qs = (selector, root = document) => root.querySelector(selector);
        const qsa = (selector, root = document) => Array.from(root.querySelectorAll(selector));

        let state = loadState();
        let activeDocId = state.activeDocId;
        let saveTimer = 0;
        let lastSnapshotAt = 0;
        let lastSavedText = "";
        let userIsSwitching = false;

        const editor = qs("#editor-area");
        const termBody = qs("#term-body");
        const termWindow = qs("#term-window");

        boot();

        function boot() {
            normalizeState();
            applyTheme(state.theme);
            applyEditorSettings();
            renderDocList();
            openDocument(activeDocId || state.docs[0].id, { skipCapture: true });
            updateClock();
            setInterval(updateClock, 1000);
            dragElement(termWindow, qs("#term-header"));
            qs("#command-bar").addEventListener("focus", () => sysLog("IO: Command line focused.", "sys"));
            document.addEventListener("keydown", handleGlobalKeys);
            setTimeout(() => {
                sysLog("KERNEL: Offliner OS boot complete.", "success");
                sysLog("STORAGE: Local notebook mounted.", "sys");
                sysLog("NET: Offline mode active.", "warn");
            }, 250);
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch (error) {
                console.warn(error);
            }

            const legacy = loadLegacyNotes();
            if (legacy.length) {
                return {
                    theme: "light",
                    docs: legacy,
                    activeDocId: legacy[0].id,
                    settings: defaultSettings()
                };
            }

            const starter = createDocFromTemplate("journal");
            starter.content = "<h1>Welcome to Super Notepad</h1><p>This notebook saves locally in your browser and works from this one HTML file.</p><h2>Today</h2><ul><li>Write something worth keeping.</li><li>Use the toolbar when the words need shape.</li></ul>";
            starter.tags = ["home", "offline"];
            return {
                theme: "light",
                docs: [starter],
                activeDocId: starter.id,
                settings: defaultSettings()
            };
        }

        function loadLegacyNotes() {
            try {
                const legacyRaw = localStorage.getItem(LEGACY_KEY);
                if (!legacyRaw) return [];
                const legacyTabs = JSON.parse(legacyRaw);
                if (!Array.isArray(legacyTabs)) return [];
                return legacyTabs.map((tab, index) => {
                    const now = new Date().toISOString();
                    return {
                        id: createId("legacy"),
                        title: tab.title || `Imported ${index + 1}`,
                        content: sanitizeHTML(tab.content || "<p></p>"),
                        tags: ["imported"],
                        color: noteColor(index),
                        pinned: false,
                        favorite: false,
                        createdAt: now,
                        updatedAt: now,
                        goal: 0,
                        snapshots: []
                    };
                });
            } catch (error) {
                console.warn(error);
                return [];
            }
        }

        function defaultSettings() {
            return {
                fontFamily: 'Georgia, "Times New Roman", serif',
                fontSize: "18px",
                lineHeight: "1.65",
                searchCase: false
            };
        }

        function normalizeState() {
            if (!state.settings) state.settings = defaultSettings();
            if (!Array.isArray(state.docs)) state.docs = [];
            if (!state.docs.length) state.docs.push(createDocFromTemplate("blank"));
            state.docs.forEach((doc, index) => {
                doc.id = doc.id || createId("note");
                doc.title = doc.title || "Untitled";
                doc.content = sanitizeHTML(doc.content || "<p></p>");
                doc.tags = Array.isArray(doc.tags) ? doc.tags : [];
                doc.color = doc.color || noteColor(index);
                doc.createdAt = doc.createdAt || new Date().toISOString();
                doc.updatedAt = doc.updatedAt || doc.createdAt;
                doc.goal = Number(doc.goal || 0);
                doc.snapshots = Array.isArray(doc.snapshots) ? doc.snapshots : [];
            });
            if (!state.docs.some(doc => doc.id === state.activeDocId)) {
                state.activeDocId = state.docs[0].id;
            }
            activeDocId = state.activeDocId;
        }

        function createDocFromTemplate(templateName = "blank") {
            const base = templates[templateName] || templates.blank;
            const now = new Date().toISOString();
            return {
                id: createId("note"),
                title: base.title,
                content: base.content,
                tags: [...base.tags],
                color: noteColor(Math.floor(Math.random() * 8)),
                pinned: false,
                favorite: false,
                createdAt: now,
                updatedAt: now,
                goal: 0,
                snapshots: []
            };
        }

        function createId(prefix) {
            return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
        }

        function noteColor(index) {
            const colors = ["#1f7a8c", "#b64242", "#5c7f36", "#b88724", "#7c5ea8", "#c06438", "#28745c", "#4d6fa9"];
            return colors[index % colors.length];
        }

        function activeDoc() {
            return state.docs.find(doc => doc.id === activeDocId) || state.docs[0];
        }

        function sortedDocs() {
            return [...state.docs].sort((a, b) => {
                if (!!b.pinned !== !!a.pinned) return Number(b.pinned) - Number(a.pinned);
                return new Date(b.updatedAt) - new Date(a.updatedAt);
            });
        }

        function renderDocList() {
            const list = qs("#doc-list");
            const search = (qs("#note-search")?.value || "").trim().toLowerCase();
            const docs = sortedDocs().filter(doc => {
                const hay = `${doc.title} ${doc.tags.join(" ")} ${textFromHTML(doc.content)}`.toLowerCase();
                return !search || hay.includes(search);
            });

            if (!docs.length) {
                list.innerHTML = "<div class='empty-state'>No matching notes</div>";
                return;
            }

            list.innerHTML = "";
            docs.forEach(doc => {
                const row = document.createElement("button");
                row.className = `doc-row ${doc.id === activeDocId ? "active" : ""}`;
                row.type = "button";
                row.onclick = () => openDocument(doc.id);
                row.title = doc.title;

                const color = document.createElement("div");
                color.className = "doc-color";
                color.style.background = doc.color;

                const main = document.createElement("div");
                main.className = "doc-main";

                const title = document.createElement("div");
                title.className = "doc-title";
                title.textContent = doc.title || "Untitled";

                const meta = document.createElement("div");
                meta.className = "doc-meta";
                const words = countWords(textFromHTML(doc.content));
                meta.textContent = `${words} words · ${relativeTime(doc.updatedAt)}`;

                const tags = document.createElement("div");
                tags.className = "doc-tags";
                doc.tags.slice(0, 3).forEach(tag => {
                    const pill = document.createElement("span");
                    pill.className = "tag-pill";
                    pill.textContent = tag;
                    tags.appendChild(pill);
                });

                const flags = document.createElement("div");
                flags.className = "doc-flags";
                const pin = document.createElement("button");
                pin.className = "mini-btn";
                pin.type = "button";
                pin.textContent = doc.pinned ? "●" : "○";
                pin.title = doc.pinned ? "Unpin" : "Pin";
                pin.onclick = event => {
                    event.stopPropagation();
                    doc.pinned = !doc.pinned;
                    doc.updatedAt = new Date().toISOString();
                    renderDocList();
                    scheduleSave("pin");
                };
                flags.appendChild(pin);

                main.append(title, meta, tags);
                row.append(color, main, flags);
                list.appendChild(row);
            });
        }

        function openDocument(id, options = {}) {
            if (!options.skipCapture) captureActiveEditor();
            const doc = state.docs.find(item => item.id === id) || state.docs[0];
            if (!doc) return;

            userIsSwitching = true;
            activeDocId = doc.id;
            state.activeDocId = doc.id;
            editor.innerHTML = sanitizeHTML(doc.content);
            qs("#note-title").value = doc.title || "Untitled";
            qs("#tag-input").value = doc.tags.join(", ");
            qs("#goal-input").value = doc.goal || "";
            lastSavedText = editor.innerHTML;
            renderDocList();
            renderInspector();
            updateStatus("Ready");
            userIsSwitching = false;
            editor.focus();
            sysLog(`NOTEPAD: Active document ${doc.title}`, "sys");
        }

        function captureActiveEditor() {
            const doc = activeDoc();
            if (!doc || userIsSwitching) return;
            const html = sanitizeHTML(editor.innerHTML);
            doc.content = html;
            doc.updatedAt = new Date().toISOString();
            if (!qs("#note-title").matches(":focus")) {
                doc.title = doc.title || deriveTitle(textFromHTML(html));
            }
        }

        function handleEditorInput() {
            const doc = activeDoc();
            if (!doc) return;
            doc.content = sanitizeHTML(editor.innerHTML);
            doc.updatedAt = new Date().toISOString();
            if (!qs("#note-title").matches(":focus")) {
                const title = deriveTitle(editor.innerText);
                if (title && (doc.title === "Untitled" || !doc.title.trim())) {
                    doc.title = title;
                    qs("#note-title").value = title;
                }
            }
            renderInspector();
            updateFooter();
            scheduleSave("input");
        }

        function handlePaste(event) {
            event.preventDefault();
            const clipboard = event.clipboardData || window.clipboardData;
            const html = clipboard.getData("text/html");
            const text = clipboard.getData("text/plain");
            document.execCommand("insertHTML", false, html ? sanitizeHTML(html) : escapeHTML(text).replace(/\n/g, "<br>"));
            handleEditorInput();
        }

        function renameActiveNote(value) {
            const doc = activeDoc();
            if (!doc) return;
            doc.title = value.trim() || "Untitled";
            doc.updatedAt = new Date().toISOString();
            renderDocList();
            scheduleSave("rename");
        }

        function updateActiveTags(value) {
            const doc = activeDoc();
            if (!doc) return;
            doc.tags = value.split(",").map(tag => tag.trim()).filter(Boolean).slice(0, 12);
            doc.updatedAt = new Date().toISOString();
            renderDocList();
            scheduleSave("tags");
        }

        function newNote(templateName = "blank") {
            captureActiveEditor();
            const doc = createDocFromTemplate(templateName);
            state.docs.unshift(doc);
            activeDocId = doc.id;
            state.activeDocId = doc.id;
            renderDocList();
            openDocument(doc.id, { skipCapture: true });
            createSnapshot("Created");
            saveNow("new note");
            toast("New note created");
        }

        function duplicateActiveNote() {
            captureActiveEditor();
            const doc = activeDoc();
            if (!doc) return;
            const copy = {
                ...doc,
                id: createId("note"),
                title: `${doc.title} Copy`,
                pinned: false,
                favorite: false,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
                snapshots: []
            };
            state.docs.unshift(copy);
            openDocument(copy.id, { skipCapture: true });
            saveNow("duplicate");
            toast("Note duplicated");
        }

        function deleteActiveNote() {
            const doc = activeDoc();
            if (!doc) return;
            if (!confirm(`Delete "${doc.title}"?`)) return;
            const index = state.docs.findIndex(item => item.id === doc.id);
            state.docs.splice(index, 1);
            if (!state.docs.length) state.docs.push(createDocFromTemplate("blank"));
            openDocument(state.docs[Math.max(0, index - 1)].id, { skipCapture: true });
            saveNow("delete");
            toast("Note deleted", "warn");
        }

        function togglePinActive() {
            const doc = activeDoc();
            if (!doc) return;
            doc.pinned = !doc.pinned;
            doc.updatedAt = new Date().toISOString();
            renderDocList();
            saveNow("pin");
            toast(doc.pinned ? "Pinned" : "Unpinned");
        }

        function setWordGoal(value) {
            const doc = activeDoc();
            if (!doc) return;
            doc.goal = Math.max(0, Number(value || 0));
            renderInspector();
            scheduleSave("goal");
        }

        function scheduleSave(reason) {
            updateStatus("Saving");
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => saveNow(reason), AUTO_SAVE_MS);
        }

        function saveNow(reason = "manual") {
            captureActiveEditor();
            const doc = activeDoc();
            if (doc && editor.innerHTML !== lastSavedText && Date.now() - lastSnapshotAt > SNAPSHOT_MS) {
                createSnapshot("Auto", { quiet: true });
            }

            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                lastSavedText = editor.innerHTML;
                updateStatus("Saved");
                updateFooter();
                renderDocList();
                if (reason === "manual") toast("Saved locally");
                sysLog(`STORAGE: Save complete (${reason}).`, "success");
            } catch (error) {
                updateStatus("Save failed");
                toast("Could not save. Browser storage may be full.", "error");
                sysLog(`STORAGE ERROR: ${error.message}`, "error");
            }
        }

        function updateStatus(text) {
            qs("#save-status").textContent = text;
        }

        function createSnapshot(label = "Manual", options = {}) {
            captureActiveEditor();
            const doc = activeDoc();
            if (!doc) return;
            const stamp = new Date().toISOString();
            doc.snapshots.unshift({
                id: createId("snap"),
                label,
                at: stamp,
                title: doc.title,
                content: doc.content
            });
            doc.snapshots = doc.snapshots.slice(0, MAX_SNAPSHOTS);
            lastSnapshotAt = Date.now();
            renderSnapshots();
            if (!options.quiet) {
                saveNow("snapshot");
                toast("Snapshot added");
            }
        }

        function restoreSnapshot(id) {
            const doc = activeDoc();
            if (!doc) return;
            const snap = doc.snapshots.find(item => item.id === id);
            if (!snap) return;
            if (!confirm(`Restore snapshot from ${formatDate(snap.at)}?`)) return;
            doc.content = sanitizeHTML(snap.content);
            doc.title = snap.title || doc.title;
            doc.updatedAt = new Date().toISOString();
            openDocument(doc.id, { skipCapture: true });
            saveNow("restore");
            toast("Snapshot restored");
        }

        function clearSnapshots() {
            const doc = activeDoc();
            if (!doc || !doc.snapshots.length) return;
            if (!confirm("Clear snapshots for this note?")) return;
            doc.snapshots = [];
            renderSnapshots();
            saveNow("clear snapshots");
        }

        function formatDoc(command, value = null) {
            editor.focus();
            document.execCommand(command, false, value);
            handleEditorInput();
        }

        function formatBlock(tag) {
            editor.focus();
            document.execCommand("formatBlock", false, tag);
            qs("#block-select").value = "P";
            handleEditorInput();
        }

        function insertRule() {
            editor.focus();
            document.execCommand("insertHTML", false, "<hr><p></p>");
            handleEditorInput();
        }

        function setTextColor(color) {
            formatDoc("foreColor", color);
        }

        function setHighlight(color) {
            formatDoc("hiliteColor", color);
        }

        function setEditorFont(value) {
            state.settings.fontFamily = value;
            applyEditorSettings();
            scheduleSave("settings");
        }

        function setEditorSize(value) {
            state.settings.fontSize = value;
            applyEditorSettings();
            scheduleSave("settings");
        }

        function applyEditorSettings() {
            document.documentElement.style.setProperty("--editor-font", state.settings.fontFamily || defaultSettings().fontFamily);
            document.documentElement.style.setProperty("--editor-size", state.settings.fontSize || defaultSettings().fontSize);
            document.documentElement.style.setProperty("--editor-line", state.settings.lineHeight || defaultSettings().lineHeight);
            const font = qs("#font-select");
            const size = qs("#size-select");
            if (font) font.value = state.settings.fontFamily || defaultSettings().fontFamily;
            if (size) size.value = state.settings.fontSize || defaultSettings().fontSize;
        }

        function toggleFindPanel() {
            qs("#find-panel").classList.toggle("is-open");
            if (qs("#find-panel").classList.contains("is-open")) {
                qs("#find-input").focus();
                qs("#find-input").select();
                updateFindCount();
            }
        }

        function findNext() {
            const needle = qs("#find-input").value;
            if (!needle) return;
            editor.focus();
            const found = window.find(needle, false, false, true, false, true, false);
            if (!found) toast("No more matches", "warn");
        }

        function updateFindCount() {
            const needle = qs("#find-input").value;
            const text = editor.innerText || "";
            const count = needle ? countMatches(text, needle, false) : 0;
            qs("#find-count").textContent = String(count);
        }

        function replaceActive(all) {
            const needle = qs("#find-input").value;
            const replacement = qs("#replace-input").value;
            if (!needle) return;
            const count = replaceInTextNodes(editor, needle, replacement, all);
            handleEditorInput();
            updateFindCount();
            toast(`${count} replacement${count === 1 ? "" : "s"}`);
        }

        function replaceInTextNodes(root, needle, replacement, all) {
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
            const nodes = [];
            let current;
            while ((current = walker.nextNode())) nodes.push(current);
            let count = 0;
            const regex = new RegExp(escapeRegExp(needle), "gi");

            for (const node of nodes) {
                if (!regex.test(node.nodeValue)) {
                    regex.lastIndex = 0;
                    continue;
                }
                regex.lastIndex = 0;
                if (all) {
                    node.nodeValue = node.nodeValue.replace(regex, () => {
                        count += 1;
                        return replacement;
                    });
                } else {
                    node.nodeValue = node.nodeValue.replace(regex, match => {
                        if (count) return match;
                        count += 1;
                        return replacement;
                    });
                    break;
                }
            }
            return count;
        }

        function renderInspector() {
            updateStats();
            renderOutline();
            renderSnapshots();
        }

        function updateStats() {
            const text = editor.innerText || "";
            const words = countWords(text);
            const chars = text.replace(/\s/g, "").length;
            const sentences = (text.match(/[.!?]+(?=\s|$)/g) || []).length;
            const minutes = Math.max(0, Math.ceil(words / 220));
            const doc = activeDoc();
            const goal = Number(doc?.goal || 0);
            const pct = goal ? Math.min(100, Math.round((words / goal) * 100)) : 0;

            qs("#stat-words").textContent = words;
            qs("#stat-chars").textContent = chars;
            qs("#stat-read").textContent = `${minutes}m`;
            qs("#stat-sent").textContent = sentences;
            qs("#goal-fill").style.width = `${pct}%`;
            updateFooter(words, chars, minutes);
        }

        function updateFooter(words = countWords(editor.innerText || ""), chars = (editor.innerText || "").replace(/\s/g, "").length, minutes = Math.max(0, Math.ceil(words / 220))) {
            const doc = activeDoc();
            qs("#footer-left").textContent = doc ? `Updated ${relativeTime(doc.updatedAt)} · ${doc.tags.length ? doc.tags.join(", ") : "untagged"}` : "Local only";
            qs("#footer-right").textContent = `${words} words · ${chars} chars · ${minutes}m`;
        }

        function renderOutline() {
            const list = qs("#outline-list");
            const heads = qsa("h1,h2,h3", editor).filter(node => node.textContent.trim());
            list.innerHTML = "";
            if (!heads.length) {
                list.innerHTML = "<div class='empty-state'>No headings</div>";
                return;
            }
            heads.forEach((head, index) => {
                if (!head.id) head.id = `heading-${index}-${Date.now().toString(36)}`;
                const btn = document.createElement("button");
                btn.className = "outline-btn";
                btn.textContent = `${head.tagName.toLowerCase()} · ${head.textContent.trim()}`;
                btn.onclick = () => head.scrollIntoView({ behavior: "smooth", block: "center" });
                list.appendChild(btn);
            });
        }

        function renderSnapshots() {
            const doc = activeDoc();
            const list = qs("#snapshot-list");
            list.innerHTML = "";
            if (!doc || !doc.snapshots.length) {
                list.innerHTML = "<div class='empty-state'>No snapshots</div>";
                return;
            }
            doc.snapshots.forEach(snap => {
                const btn = document.createElement("button");
                btn.className = "snapshot-btn";
                btn.textContent = `${snap.label} · ${formatDate(snap.at)}`;
                btn.onclick = () => restoreSnapshot(snap.id);
                list.appendChild(btn);
            });
        }

        function exportFromSelect(value) {
            if (!value) return;
            if (value === "all-json") exportAllJson();
            else exportActive(value);
        }

        function exportActive(format) {
            captureActiveEditor();
            const doc = activeDoc();
            if (!doc) return;
            const safeTitle = safeFileName(doc.title || "note");
            if (format === "txt") {
                downloadFile(`${safeTitle}.txt`, "text/plain;charset=utf-8", textFromHTML(doc.content));
            }
            if (format === "html") {
                const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHTML(doc.title)}</title><style>body{font-family:Georgia,serif;line-height:1.6;max-width:820px;margin:40px auto;padding:0 24px;color:#1d252c}</style></head><body>${doc.content}</body></html>`;
                downloadFile(`${safeTitle}.html`, "text/html;charset=utf-8", html);
            }
            if (format === "json") {
                downloadFile(`${safeTitle}.json`, "application/json;charset=utf-8", JSON.stringify(doc, null, 2));
            }
            sysLog(`EXPORT: ${doc.title} as ${format}.`, "success");
        }

        function exportAllJson() {
            captureActiveEditor();
            downloadFile(`offliner-notes-${new Date().toISOString().slice(0, 10)}.json`, "application/json;charset=utf-8", JSON.stringify(state, null, 2));
            sysLog("EXPORT: Full notebook JSON.", "success");
        }

        function downloadFile(name, type, content) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = name;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
            toast(`Exported ${name}`);
        }

        async function importFile(event) {
            const file = event.target.files[0];
            event.target.value = "";
            if (!file) return;
            try {
                const text = await file.text();
                const ext = file.name.split(".").pop().toLowerCase();
                if (ext === "json") {
                    importJson(text, file.name);
                } else if (ext === "html" || ext === "htm") {
                    importHtml(text, file.name);
                } else {
                    importText(text, file.name);
                }
                saveNow("import");
            } catch (error) {
                toast(`Import failed: ${error.message}`, "error");
                sysLog(`IMPORT ERROR: ${error.message}`, "error");
            }
        }

        function importJson(text, filename) {
            const parsed = JSON.parse(text);
            const docs = Array.isArray(parsed.docs) ? parsed.docs : Array.isArray(parsed) ? parsed : [parsed];
            docs.forEach((item, index) => {
                const doc = {
                    ...createDocFromTemplate("blank"),
                    ...item,
                    id: createId("note"),
                    title: item.title || filename.replace(/\.json$/i, "") || `Imported ${index + 1}`,
                    content: sanitizeHTML(item.content || "<p></p>"),
                    updatedAt: new Date().toISOString(),
                    createdAt: new Date().toISOString(),
                    snapshots: []
                };
                state.docs.unshift(doc);
                activeDocId = doc.id;
            });
            openDocument(activeDocId, { skipCapture: true });
            toast(`${docs.length} note${docs.length === 1 ? "" : "s"} imported`);
        }

        function importHtml(text, filename) {
            const bodyMatch = text.match(/<body[^>]*>([\s\S]*)<\/body>/i);
            const content = sanitizeHTML(bodyMatch ? bodyMatch[1] : text);
            const doc = createDocFromTemplate("blank");
            doc.title = filename.replace(/\.html?$/i, "") || "Imported HTML";
            doc.content = content;
            doc.tags = ["imported", "html"];
            state.docs.unshift(doc);
            openDocument(doc.id, { skipCapture: true });
            toast("HTML imported");
        }

        function importText(text, filename) {
            const doc = createDocFromTemplate("blank");
            doc.title = filename.replace(/\.txt$/i, "") || "Imported Text";
            doc.content = `<h1>${escapeHTML(doc.title)}</h1><p>${escapeHTML(text).replace(/\n{2,}/g, "</p><p>").replace(/\n/g, "<br>")}</p>`;
            doc.tags = ["imported", "text"];
            state.docs.unshift(doc);
            openDocument(doc.id, { skipCapture: true });
            toast("Text imported");
        }

        function printActiveNote() {
            captureActiveEditor();
            saveNow("print");
            window.print();
        }

        function toggleFocusMode() {
            qs("#notepad-stage").classList.toggle("is-focus");
            const on = qs("#notepad-stage").classList.contains("is-focus");
            toast(on ? "Focus mode on" : "Focus mode off");
            editor.focus();
        }

        function openNotepad() {
            closeAllOverlays();
            qs("#notepad-stage").classList.remove("is-hidden");
            editor.focus();
            sysLog("PROCESS: Notepad active.", "success");
        }

        function openAppLibrary() {
            qs("#app-library").classList.add("is-open");
            sysLog("PROCESS: App library opened.", "sys");
        }

        function openResrever() {
            closeAllOverlays();
            qs("#resrever-stage").classList.add("is-open");
            qs("#rev-input").focus();
            sysLog("PROCESS: Resrever started.", "success");
        }

        function closeOverlay(id) {
            qs(`#${id}`).classList.remove("is-open");
            sysLog(`PROCESS: Overlay ${id} closed.`, "sys");
        }

        function closeAllOverlays() {
            qsa(".overlay.is-open").forEach(node => node.classList.remove("is-open"));
        }

        function quitApp(id) {
            if (id === "game-stage") {
                quitGameLogic();
                closeOverlay("game-stage");
                sysLog("PROCESS: Road game terminated.", "warn");
                return;
            }
            closeOverlay(id);
        }

        function reverseText() {
            const input = qs("#rev-input").value;
            const wordMode = qs("#opt-word").checked;
            const capMode = qs("#opt-cap").checked;
            let output = wordMode
                ? input.split(/(\s+)/).map(part => /\s+/.test(part) ? part : reverseGraphemes(part)).join("")
                : reverseGraphemes(input);

            if (capMode) {
                output = output.toLowerCase().replace(/(^|[.!?]\s+)([a-z])/g, (_, prefix, letter) => prefix + letter.toUpperCase());
            }
            qs("#rev-output").value = output;
        }

        function reverseGraphemes(text) {
            return Array.from(text).reverse().join("");
        }

        function changeReverseFont() {
            qs("#rev-output").style.fontFamily = qs("#rev-font-select").value;
            sysLog("CONFIG: Resrever font updated.", "sys");
        }

        async function copyOutput() {
            const output = qs("#rev-output").value;
            try {
                await navigator.clipboard.writeText(output);
                toast("Copied");
            } catch {
                qs("#rev-output").select();
                document.execCommand("copy");
                toast("Copied");
            }
            sysLog("IO: Clipboard write complete.", "success");
        }

        function sendReverseToNote() {
            const output = qs("#rev-output").value.trim();
            if (!output) return;
            openNotepad();
            document.execCommand("insertHTML", false, `<p>${escapeHTML(output)}</p>`);
            handleEditorInput();
            toast("Added to note");
        }

        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let speed = 4.6;
        let currentLane = 1;
        let spawnTimer = 0;
        const enemyTimers = new Set();

        async function startCarGame() {
            closeAllOverlays();
            qs("#game-stage").classList.add("is-open");
            qs("#best-disp").textContent = localStorage.getItem("carBest") || "0.00";
            sysLog("PROCESS: Road game started.", "success");
            initGame();
        }

        function initGame() {
            quitGameLogic();
            gameRunning = true;
            gamePaused = false;
            score = 0;
            speed = 4.6;
            currentLane = 1;
            qsa(".enemy").forEach(enemy => enemy.remove());
            positionPlayer();
            requestAnimationFrame(gameLoop);
            spawnEnemy();
        }

        function gameLoop() {
            if (!gameRunning) return;
            if (!gamePaused) {
                score += 0.018;
                speed = 4.6 + score / 10;
                qs("#score-disp").textContent = score.toFixed(2);
            }
            requestAnimationFrame(gameLoop);
        }

        function spawnEnemy() {
            if (!gameRunning || gamePaused) return;
            const road = qs("#road");
            const enemy = document.createElement("div");
            enemy.className = "enemy";
            enemy.textContent = ["🚗", "🚕", "🚓", "🚐", "🚌"][Math.floor(Math.random() * 5)];
            enemy.dataset.lane = String(Math.floor(Math.random() * 3));
            enemy.style.left = `${laneLeft(Number(enemy.dataset.lane))}px`;
            enemy.style.top = "-72px";
            road.appendChild(enemy);

            const timer = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timer);
                    enemyTimers.delete(timer);
                    return;
                }
                if (gamePaused) return;
                const top = (parseFloat(enemy.style.top) || -72) + speed;
                enemy.style.top = `${top}px`;
                if (collides(qs("#player"), enemy)) endGame();
                if (top > road.clientHeight + 90) {
                    clearInterval(timer);
                    enemyTimers.delete(timer);
                    enemy.remove();
                }
            }, 16);
            enemyTimers.add(timer);
            spawnTimer = setTimeout(spawnEnemy, Math.max(360, 1250 - score * 26));
        }

        function endGame() {
            gameRunning = false;
            clearTimeout(spawnTimer);
            enemyTimers.forEach(timer => clearInterval(timer));
            enemyTimers.clear();
            const finalScore = Number(score.toFixed(2));
            const best = Number(localStorage.getItem("carBest") || 0);
            if (finalScore > best) {
                localStorage.setItem("carBest", finalScore.toFixed(2));
                qs("#best-disp").textContent = finalScore.toFixed(2);
                toast(`New record: ${finalScore.toFixed(2)}`);
                sysLog(`GAME: New record ${finalScore.toFixed(2)}.`, "success");
            } else {
                toast(`Crashed at ${finalScore.toFixed(2)}`, "warn");
                sysLog(`GAME: Collision at ${finalScore.toFixed(2)}.`, "error");
            }
            setTimeout(() => quitApp("game-stage"), 800);
        }

        function quitGameLogic() {
            gameRunning = false;
            clearTimeout(spawnTimer);
            enemyTimers.forEach(timer => clearInterval(timer));
            enemyTimers.clear();
            qsa(".enemy").forEach(enemy => enemy.remove());
        }

        function moveLane(delta) {
            if (!gameRunning) return;
            currentLane = Math.max(0, Math.min(2, currentLane + delta));
            positionPlayer();
            sysLog(`GAME: Lane ${currentLane + 1}.`, "sys");
        }

        function positionPlayer() {
            qs("#player").style.left = `${laneLeft(currentLane)}px`;
        }

        function laneLeft(lane) {
            const road = qs("#road");
            const laneWidth = road.clientWidth / 3;
            return Math.round(lane * laneWidth + laneWidth / 2 - 29);
        }

        function collides(a, b) {
            const ar = a.getBoundingClientRect();
            const br = b.getBoundingClientRect();
            return ar.left + 12 < br.right - 12 && ar.right - 12 > br.left + 12 && ar.top + 12 < br.bottom - 12 && ar.bottom - 12 > br.top + 12;
        }

        function showTerminal() {
            termWindow.classList.add("is-open");
            sysLog("GUI: Terminal visible.", "sys");
        }

        function hideTerminal() {
            termWindow.classList.remove("is-open");
            sysLog("GUI: Terminal hidden.", "sys");
        }

        function sysLog(message, type = "sys") {
            const line = document.createElement("div");
            line.className = "log-line";

            const time = document.createElement("span");
            time.className = "log-time";
            time.textContent = `[${new Date().toLocaleTimeString("en-US", { hour12: false })}]`;

            const body = document.createElement("span");
            body.className = `log-${type}`;
            body.textContent = message;

            line.append(time, body);
            termBody.appendChild(line);
            while (termBody.children.length > 240) termBody.firstElementChild.remove();
            termBody.scrollTop = termBody.scrollHeight;
        }

        function dragElement(element, handle) {
            if (!element || !handle) return;
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            handle.onmousedown = dragMouseDown;

            function dragMouseDown(event) {
                event.preventDefault();
                pos3 = event.clientX;
                pos4 = event.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(event) {
                event.preventDefault();
                pos1 = pos3 - event.clientX;
                pos2 = pos4 - event.clientY;
                pos3 = event.clientX;
                pos4 = event.clientY;
                const top = Math.max(8, Math.min(window.innerHeight - 60, element.offsetTop - pos2));
                const left = Math.max(8, Math.min(window.innerWidth - 80, element.offsetLeft - pos1));
                element.style.top = `${top}px`;
                element.style.left = `${left}px`;
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        function handleCommand(event) {
            if (event.key !== "Enter") return;
            const input = event.target.value.trim();
            event.target.value = "";
            if (!input) {
                toast("Command needed", "warn");
                return;
            }
            const cmd = input.toLowerCase();
            sysLog(`CLI: ${input}`, "sys");

            if (["notepad", "note", "notes", "write"].includes(cmd)) return openNotepad();
            if (["apps", "menu", "library"].includes(cmd)) return openAppLibrary();
            if (["terminal", "term", "logs", "cmd"].includes(cmd)) return showTerminal();
            if (["reverse", "resrever", "reverser"].includes(cmd)) return openResrever();
            if (["game", "drive", "car"].includes(cmd)) return startCarGame();
            if (["theme", "dark", "light", "ink"].includes(cmd)) return setThemeFromCommand(cmd);
            if (["new", "new note"].includes(cmd)) return newNote();
            if (["save", "save note"].includes(cmd)) return saveNow("manual");
            if (["focus", "zen"].includes(cmd)) return toggleFocusMode();
            if (["print"].includes(cmd)) return printActiveNote();
            if (cmd.startsWith("find ")) {
                qs("#find-panel").classList.add("is-open");
                qs("#find-input").value = input.slice(5);
                updateFindCount();
                findNext();
                return;
            }
            if (cmd.startsWith("search ")) {
                qs("#note-search").value = input.slice(7);
                renderDocList();
                return;
            }
            toast(`Unknown command: ${input}`, "error");
            sysLog(`CLI ERROR: Unknown token ${input}.`, "error");
        }

        function handleGlobalKeys(event) {
            if (gameRunning && ["ArrowLeft", "a", "A"].includes(event.key)) {
                event.preventDefault();
                moveLane(-1);
                return;
            }
            if (gameRunning && ["ArrowRight", "d", "D"].includes(event.key)) {
                event.preventDefault();
                moveLane(1);
                return;
            }
            if (event.ctrlKey && event.key.toLowerCase() === "s") {
                event.preventDefault();
                saveNow("manual");
            }
            if (event.ctrlKey && event.key.toLowerCase() === "n") {
                event.preventDefault();
                newNote();
            }
            if (event.ctrlKey && event.key.toLowerCase() === "f") {
                event.preventDefault();
                toggleFindPanel();
            }
            if (event.key === "Escape") {
                closeAllOverlays();
                if (qs("#find-panel").classList.contains("is-open")) qs("#find-panel").classList.remove("is-open");
            }
        }

        function toggleTheme() {
            const current = THEMES.indexOf(state.theme || "light");
            const next = THEMES[(current + 1) % THEMES.length];
            applyTheme(next);
            state.theme = next;
            saveNow("theme");
        }

        function setThemeFromCommand(cmd) {
            const next = cmd === "theme" ? THEMES[(THEMES.indexOf(state.theme || "light") + 1) % THEMES.length] : cmd;
            applyTheme(next);
            state.theme = next;
            saveNow("theme");
        }

        function applyTheme(theme) {
            state.theme = THEMES.includes(theme) ? theme : "light";
            document.body.setAttribute("data-theme", state.theme === "light" ? "" : state.theme);
            qs("#theme-toggle").textContent = state.theme === "light" ? "☀" : state.theme === "dark" ? "☾" : "✒";
        }

        function updateClock() {
            qs("#clock").textContent = new Date().toLocaleString("en-US", {
                hour: "2-digit",
                minute: "2-digit",
                month: "short",
                day: "numeric"
            });
        }

        function toast(message, kind = "success") {
            const node = document.createElement("div");
            node.className = `toast ${kind}`;
            node.textContent = message;
            qs("#toast-region").appendChild(node);
            setTimeout(() => {
                node.style.opacity = "0";
                node.style.transform = "translateY(8px)";
                setTimeout(() => node.remove(), 180);
            }, 2600);
        }

        function sanitizeHTML(html) {
            const template = document.createElement("template");
            template.innerHTML = html || "";
            qsa("script,style,iframe,object,embed,link,meta", template.content).forEach(node => node.remove());
            qsa("*", template.content).forEach(node => {
                [...node.attributes].forEach(attr => {
                    const name = attr.name.toLowerCase();
                    const value = String(attr.value || "").trim().toLowerCase();
                    if (name.startsWith("on") || value.startsWith("javascript:")) node.removeAttribute(attr.name);
                });
            });
            return template.innerHTML;
        }

        function textFromHTML(html) {
            const tmp = document.createElement("div");
            tmp.innerHTML = sanitizeHTML(html);
            return tmp.innerText || tmp.textContent || "";
        }

        function deriveTitle(text) {
            return (text || "").split(/\n+/).map(line => line.trim()).find(Boolean)?.slice(0, 80) || "Untitled";
        }

        function countWords(text) {
            return (text.match(/[A-Za-z0-9]+(?:['-][A-Za-z0-9]+)*/g) || []).length;
        }

        function countMatches(text, needle, caseSensitive) {
            if (!needle) return 0;
            const hay = caseSensitive ? text : text.toLowerCase();
            const find = caseSensitive ? needle : needle.toLowerCase();
            let count = 0;
            let at = 0;
            while ((at = hay.indexOf(find, at)) !== -1) {
                count += 1;
                at += find.length || 1;
            }
            return count;
        }

        function escapeHTML(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[char]));
        }

        function escapeRegExp(value) {
            return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        }

        function safeFileName(value) {
            return String(value || "note").replace(/[<>:"/\\|?*\x00-\x1F]/g, "-").replace(/\s+/g, " ").trim().slice(0, 80) || "note";
        }

        function relativeTime(iso) {
            const then = new Date(iso).getTime();
            const diff = Date.now() - then;
            if (!Number.isFinite(diff)) return "just now";
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return "just now";
            if (mins < 60) return `${mins}m ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days}d ago`;
            return new Date(iso).toLocaleDateString();
        }

        function formatDate(iso) {
            return new Date(iso).toLocaleString("en-US", {
                month: "short",
                day: "numeric",
                hour: "2-digit",
                minute: "2-digit"
            });
        }
    </script>
</body>
